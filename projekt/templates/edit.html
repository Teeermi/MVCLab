{% extends 'base.html' %}

{% block title %}Edytuj zadanie{% endblock %}

{% block content %}
<h2>Edytuj zadanie #{{ task.id }}</h2>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="opis" class="form-label">Opis zadania</label>
                <textarea name="opis" id="opis" class="form-control" rows="3" required>{{ task.opis }}</textarea>
            </div>

            <div class="mb-3">
                <label for="termin_wykonania" class="form-label">Termin wykonania</label>
                <input type="date" name="termin_wykonania" id="termin_wykonania" class="form-control" value="{{ task.termin_wykonania }}" required>
            </div>

            <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select name="status" id="status" class="form-select">
                    <option value="do_zrobienia" {% if task.status == 'do_zrobienia' %}selected{% endif %}>Do zrobienia</option>
                    <option value="w_trakcie" {% if task.status == 'w_trakcie' %}selected{% endif %}>W trakcie</option>
                    <option value="zakonczone" {% if task.status == 'zakonczone' %}selected{% endif %}>Zakonczone</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="category_id" class="form-label">Kategoria</label>
                <select name="category_id" id="category_id" class="form-select">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if task.category_id == cat.id %}selected{% endif %}>{{ cat.nazwa }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label for="priority_id" class="form-label">Priorytet</label>
                <select name="priority_id" id="priority_id" class="form-select">
                    {% for p in priorities %}
                    <option value="{{ p.id }}" {% if task.priority_id == p.id %}selected{% endif %}>{{ p.nazwa }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
                <a href="{{ url_for('index') }}" class="btn btn-secondary">Anuluj</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
