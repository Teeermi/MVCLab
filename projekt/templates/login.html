{% extends 'base.html' %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2>Logowanie</h2>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="username" class="form-label">Login</label>
                        <input type="text" name="username" id="username" class="form-control" required minlength="3" autocomplete="username">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Haslo</label>
                        <input type="password" name="password" id="password" class="form-control" required minlength="3" autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Zaloguj</button>
                </form>
            </div>
            <div class="card-footer text-muted small">
                Demo: admin / admin123
            </div>
        </div>
    </div>
</div>
{% endblock %}
